name: Catalog Hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  catalog-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Catalog sanitization check
        run: npm run check:catalog-sanitization
